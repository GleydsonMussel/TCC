version: '3.8'

services:
  ros_noetic:
    container_name: ros_noetic_container
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    platform: linux/arm64
    runtime: nvidia
    tty: true
    volumes:
      - ./:/workspace
    environment:
      - LANG=C.UTF-8
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    networks:
      - ros_network

networks:
  ros_network:
    driver: bridge